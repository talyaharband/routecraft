<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Routecraft Pipeline</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #64707d;
      --line: #d7dee8;
      --page: #f5f7fa;
      --panel: #ffffff;
      --blue: #245fb8;
      --green: #17775c;
      --rose: #a63f5f;
      font-family: Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--page); color: var(--ink); }
    main { max-width: 1180px; margin: 0 auto; padding: 30px 18px 42px; }
    header { display: flex; justify-content: space-between; gap: 18px; align-items: end; margin-bottom: 22px; }
    h1 { margin: 0; font-size: 40px; letter-spacing: 0; }
    p { margin: 8px 0 0; color: var(--muted); line-height: 1.45; }
    a { color: var(--blue); font-weight: 700; text-decoration: none; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.7fr); gap: 18px; align-items: start; }
    .flow, .details { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    .flow { display: grid; grid-template-columns: repeat(3, minmax(170px, 1fr)); gap: 14px 30px; }
    .node-wrap { position: relative; min-height: 124px; }
    .node-wrap::after { content: "->"; position: absolute; top: 48%; right: -23px; color: #7a8592; font-weight: 800; }
    .node-wrap:nth-child(3n)::after, .node-wrap.end::after { content: ""; }
    button.node { width: 100%; min-height: 124px; height: 100%; text-align: left; cursor: pointer; background: #fbfcfe; border: 1px solid var(--line); border-left: 7px solid var(--blue); border-radius: 8px; padding: 13px; color: var(--ink); display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
    button.node[data-kind="data"] { border-left-color: var(--green); }
    button.node[data-kind="route"] { border-left-color: var(--rose); }
    button.node[aria-pressed="true"] { outline: 3px solid rgba(36, 95, 184, 0.25); background: #eef5ff; }
    .eyebrow { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .title { display: block; font-size: 18px; font-weight: 800; line-height: 1.15; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.3; }
    .details { position: sticky; top: 18px; }
    .details h2 { margin: 0; font-size: 26px; }
    .script { margin-top: 8px; color: var(--blue); font-family: Consolas, monospace; font-weight: 700; }
    .section { border-top: 1px solid var(--line); margin-top: 16px; padding-top: 14px; }
    .section h3 { margin: 0 0 8px; color: var(--muted); font-size: 13px; text-transform: uppercase; }
    ul { margin: 0; padding-left: 18px; }
    li { margin: 6px 0; line-height: 1.35; }
    code { background: #eef1f6; padding: 1px 4px; border-radius: 4px; }
    @media (max-width: 900px) {
      header { align-items: start; flex-direction: column; }
      .layout { grid-template-columns: 1fr; }
      .details { position: static; }
      .flow { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
      .node-wrap::after { content: ""; }
    }
    @media (max-width: 560px) {
      h1 { font-size: 32px; }
      .flow { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Routecraft Pipeline</h1>
        <p>The active automated flow only. Older standalone helper scripts are intentionally omitted.</p>
      </div>
      <a href="PIPELINE.md">PIPELINE.md</a>
    </header>

    <section class="layout">
      <div class="flow" id="flow"></div>
      <aside class="details">
        <h2 id="detail-title"></h2>
        <div class="script" id="detail-script"></div>
        <div class="section">
          <h3>Input</h3>
          <ul id="detail-input"></ul>
        </div>
        <div class="section">
          <h3>Output</h3>
          <ul id="detail-output"></ul>
        </div>
        <div class="section">
          <h3>Code Files Used</h3>
          <ul id="detail-files"></ul>
        </div>
        <p id="detail-note"></p>
      </aside>
    </section>
  </main>

  <script>
    const stages = [
      {
        id: "source",
        kind: "data",
        eyebrow: "Source",
        title: "Raw Orders",
        meta: "Excel input",
        script: "input file",
        input: ["Raw order Excel."],
        output: ["Rows passed into stage 1."],
        files: ["flow.py"],
        note: "Expected raw columns include order id, client id, site id, site name, ship to street 1, ship to street 2, required delivery date, and comments."
      },
      {
        id: "cleanup",
        kind: "script",
        eyebrow: "Stage 1",
        title: "Clean Addresses",
        meta: "Parse raw address columns",
        script: "data.cleanup.py",
        input: ["Raw order Excel."],
        output: ["01a_failed_addresses.xlsx", "01b_addresses_for_geocoding.xlsx", "01c_good_orders_original_format.xlsx"],
        files: ["flow.py", "data.cleanup.py"],
        note: "Deletes required delivery date, merges street columns, separates failed rows, and preserves original order/client/comment data."
      },
      {
        id: "geocode",
        kind: "script",
        eyebrow: "Stage 2",
        title: "Geocode",
        meta: "Coordinates and Google validation",
        script: "flow.py",
        input: ["City, Street_Name, House_Number rows."],
        output: ["02_geocoded_addresses.xlsx", "02a_failed_geocoding_addresses.xlsx when needed"],
        files: ["flow.py"],
        note: "Only precise Google matches in the requested city continue. Mock mode can replace Google for testing."
      },
      {
        id: "cluster",
        kind: "script",
        eyebrow: "Stage 3",
        title: "Cluster Nearby Stops",
        meta: "City-aware street clustering",
        script: "flow.py",
        input: ["Geocoded rows with LAT and LNG."],
        output: ["03_nearby_address_clusters.xlsx"],
        files: ["flow.py"],
        note: "Clusters nearby rows on the same street inside each city."
      },
      {
        id: "groups",
        kind: "script",
        eyebrow: "Stage 4",
        title: "Create Groups",
        meta: "City-aware constrained groups",
        script: "flow.py",
        input: ["Clustered rows."],
        output: ["04_clustered_delivery_groups.xlsx"],
        files: ["flow.py"],
        note: "Group numbers continue globally across cities instead of restarting."
      },
      {
        id: "matrices",
        kind: "script",
        eyebrow: "Stage 5",
        title: "Build Matrices",
        meta: "Driving-time matrices",
        script: "distance.matrix.py",
        input: ["Grouped rows with cluster_group."],
        output: ["05_distance_matrix_group-<group>.xlsx files."],
        files: ["flow.py", "distance.matrix.py"],
        note: "Builds labels as Street_Name House_Number, City. Mock mode can replace Google matrix calls."
      },
      {
        id: "deliveries",
        kind: "route",
        eyebrow: "Stage 6",
        title: "Delivery Plan",
        meta: "Final routes and reports",
        script: "deliveries.py",
        input: ["Grouped rows.", "Matrix files.", "Original order metadata when stage 1 was included."],
        output: ["06_delivery_plan.xlsx", "06_delivery_plan.html", "06_delivery_plan.log"],
        files: ["flow.py", "deliveries.py"],
        note: "Produces the driver-facing route report. Comments and order IDs appear when stage 1 metadata exists."
      }
    ];

    const flow = document.getElementById("flow");
    const detailTitle = document.getElementById("detail-title");
    const detailScript = document.getElementById("detail-script");
    const detailInput = document.getElementById("detail-input");
    const detailOutput = document.getElementById("detail-output");
    const detailFiles = document.getElementById("detail-files");
    const detailNote = document.getElementById("detail-note");

    function list(target, values) {
      target.replaceChildren();
      values.forEach((value) => {
        const li = document.createElement("li");
        li.textContent = value;
        target.appendChild(li);
      });
    }

    function select(id) {
      const stage = stages.find((item) => item.id === id);
      if (!stage) return;
      document.querySelectorAll(".node").forEach((node) => {
        node.setAttribute("aria-pressed", String(node.dataset.stage === id));
      });
      detailTitle.textContent = stage.title;
      detailScript.textContent = stage.script;
      list(detailInput, stage.input);
      list(detailOutput, stage.output);
      list(detailFiles, stage.files);
      detailNote.textContent = stage.note;
    }

    stages.forEach((stage, index) => {
      const wrap = document.createElement("div");
      wrap.className = `node-wrap ${index === stages.length - 1 ? "end" : ""}`;
      const button = document.createElement("button");
      button.className = "node";
      button.type = "button";
      button.dataset.stage = stage.id;
      button.dataset.kind = stage.kind;
      button.setAttribute("aria-pressed", "false");
      button.addEventListener("click", () => select(stage.id));
      button.innerHTML = `<span class="eyebrow"></span><span class="title"></span><span class="meta"></span>`;
      button.querySelector(".eyebrow").textContent = stage.eyebrow;
      button.querySelector(".title").textContent = stage.title;
      button.querySelector(".meta").textContent = stage.meta;
      wrap.appendChild(button);
      flow.appendChild(wrap);
    });

    select("cleanup");
  </script>
</body>
</html>
